name: Daily Stocks

# ⚠️ 定时已停用：akshare（东财/新浪）对 GitHub 海外 IP 硬封锁
# （CI 实测：东财源 Connection aborted → 切新浪源仍失败），定时只会每天报红、取不到行情。
# 真实选股数据由本地 scripts/update_lighthouse.sh 用问财实筛产出后提交部署（见 README「数据说明」）。
# 保留 workflow_dispatch 仅供手动测 akshare 连通性（海外预期仍失败）。
on:
  workflow_dispatch:
    inputs:
      force:
        description: '忽略交易日，强制跑（手动测 akshare 用；海外预期失败）'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  score-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.155.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install akshare pandas

      - name: Run CAN SLIM scoring
        # 阶段1 全市场 spot 初筛 → 阶段2 TOP50 深度取数 → 输出 site/data/picks/latest.json
        # market_state 当前默认 watch；P3 接入宏观灯塔信号后改为读取
        run: python scraper/stocks/engine.py --market watch --enrich-top 50 ${{ inputs.force == true && '--force' || '' }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build Hugo
        run: cd site && hugo --minify

      - name: Commit and push picks data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/picks/
          git diff --staged --quiet || git commit -m "📈 daily stock picks $(date +%Y-%m-%d) [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Retry deploy on failure
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
