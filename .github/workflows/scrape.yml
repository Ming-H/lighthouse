name: Daily Scrape

on:
  # 主触发：外部定时器（cron-job.org）在北京 20:00 准点 POST repository_dispatch，
  # 绕开 GitHub Actions 自带 cron 的系统性 1–3h 延迟。client_payload.date 可选传日期。
  repository_dispatch:
    types: [scrape]
  schedule:
    # 备份兜底（仅当外部定时器失效时才靠它）：刻意错峰、避开整点 :00/:30 扎堆
    - cron: '7 12 * * *'    # 北京 20:07（主备份）
    - cron: '37 14 * * *'   # 北京 22:37（二次备份）
  workflow_dispatch:
    inputs:
      date:
        description: 'Date (YYYYMMDD), empty for today'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.155.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install jieba pyyaml anthropic

      - name: Compute target date
        # 目标 = 北京时间下「最近一期已播出的新闻联播」。
        # 联播 ~19:00 播出；GitHub 定时任务常被延迟数小时，一旦跨过北京 0 点，
        # 「今天」的联播还没播——此时必须回退到昨天，否则会去抓未来日期的页面
        # （404）被误判为「无数据」。手动 dispatch 传了 date 则以传入日期为准（补抓历史）。
        run: |
          INPUT_DATE="${{ github.event.inputs.date }}${{ github.event.client_payload.date }}"
          if [ -n "$INPUT_DATE" ]; then
            TARGET="$INPUT_DATE"
          else
            BJ_HOUR=$(TZ=Asia/Shanghai date +%H)
            if [ "$BJ_HOUR" -lt 19 ]; then
              TARGET=$(TZ=Asia/Shanghai date -d 'yesterday' +%Y%m%d)
            else
              TARGET=$(TZ=Asia/Shanghai date +%Y%m%d)
            fi
          fi
          TARGET_DASH="${TARGET:0:4}-${TARGET:4:2}-${TARGET:6:2}"
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "TARGET_DASH=$TARGET_DASH" >> "$GITHUB_ENV"
          echo "🎯 目标日期: $TARGET_DASH（北京时区最近一期已播出联播）"

      - name: Run scrape pipeline
        env:
          # 智谱 GLM key（已配置 ZHIPUAI_API_KEY secret；未配置则 AI 解读自动跳过）
          ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
          LLM_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
        run: |
          INPUT_DATE="${{ github.event.inputs.date }}${{ github.event.client_payload.date }}"
          if [ -n "$INPUT_DATE" ]; then
            # 手动补抓：强制重跑指定日期（不走幂等跳过）
            python scraper/run_daily.py --date="$INPUT_DATE"
          else
            # 定时触发：目标日期已生成（主跑成功）则补跑跳过，幂等防重复
            if [ -f "site/content/daily/${TARGET_DASH}.md" ]; then
              echo "✓ ${TARGET_DASH} 已生成，补跑跳过抓取"
            else
              python scraper/run_daily.py --date="$TARGET"
            fi
          fi

      - name: Generate lighthouse signal (M)
        env:
          ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
          LLM_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
        run: |
          python scraper/llm_brief.py "$TARGET" --signal --force || true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build Hugo
        run: cd site && hugo --minify

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ site/content/ site/data/
          git diff --staged --quiet || git commit -m "📰 daily update $(date +%Y-%m-%d) [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deploy
        continue-on-error: true
      - name: Retry deploy on failure
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4
